services:
  - type: web
    name: proctorx
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: proctorx-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: proctorx-db
    plan: free
